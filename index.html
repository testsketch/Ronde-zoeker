// ✅ SUPER ROBUUSTE PARSER
function loadData(){

    let cleaned = rawData
        .replace(/\r/g, "")
        .replace(/\n+/g, "\n") // lijnen netjes maken

    let rows = cleaned.split("\n");
    let result = [];

    rows.forEach((row, index) => {
        row = row.trim();

        if(row === "") return;

        try {
            // keys quotes toevoegen
            let fixed = row
                .replace(/(\w+):/g, '"$1":')
                .replace(/,$/, ""); // trailing comma weg

            let obj = JSON.parse(fixed);

            // ✅ alleen geldige rijen houden
            if(
                obj.straat &&
                obj.round &&
                obj.type &&
                obj.min != null &&
                obj.max != null
            ){
                result.push(obj);
            }

        } catch(e){
            console.warn("Rij overgeslagen:", index, row);
        }
    });

    return result;
}
function spraak(){

    // ✅ controle of browser het ondersteunt
    let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Spraakherkenning wordt niet ondersteund in deze browser");
        return;
    }

    let rec = new SpeechRecognition();

    rec.lang = "nl-BE";   // Belgisch Nederlands
    rec.interimResults = false;

    rec.onresult = function(e){
        let tekst = e.results[0][0].transcript;

        // ✅ zet tekst in input
        document.getElementById("input").value = tekst;

        // ✅ automatisch zoeken
        zoek();
    };

    rec.onerror = function(e){
        console.error(e);
        alert("Fout bij spraakherkenning");
    };

    rec.start();
}

const data = loadData();


// ✅ helpers
function extractNumber(str){
    let m = str.match(/\d+/);
    return m ? parseInt(m[0]) : null;
}

function extractStreet(str){
    return str.replace(/\d+.*/, "").trim().toUpperCase();
}


// ✅ zoekfunctie

function levenshtein(a, b){
    let matrix = [];

    for(let i=0;i<=b.length;i++){ matrix[i]=[i]; }
    for(let j=0;j<=a.length;j++){ matrix[0][j]=j; }

    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            if(b.charAt(i-1) === a.charAt(j-1)){
                matrix[i][j] = matrix[i-1][j-1];
            } else {
                matrix[i][j] = Math.min(
                    matrix[i-1][j-1]+1,
                    matrix[i][j-1]+1,
                    matrix[i-1][j]+1
                );
            }
        }
    }

    return matrix[b.length][a.length];
}

function zoek(){

    let input = document.getElementById("input").value;

    let nr = extractNumber(input);
    let straat = extractStreet(input);

    if(!nr || !straat){
        document.getElementById("resultaat").innerText = "Ongeldige input";
        return;
    }

    let type = (nr % 2 === 0) ? "Even" : "Oneven";

    // ✅ ALLE exacte matches vinden
    let matches = data.filter(r =>
        levenshtein(r.straat.toUpperCase(), straat) <= 2 &&
        r.type === type &&
        nr >= r.min &&
        nr <= r.max
    );
let besteStraat = null;
let besteScore = Infinity;

data.forEach(r => {
    let score = levenshtein(r.straat.toUpperCase(), straat);
    if(score < besteScore){
        besteScore = score;
        besteStraat = r.straat.toUpperCase();
    }
});

    if(matches.length > 0){

let tekst = "Straat: " + besteStraat + "<br><br>Resultaten:<br>";


        matches.forEach(m => {
            tekst += m.gemeente + " → " + m.round + "<br>";
        });

        document.getElementById("resultaat").innerHTML = tekst;
        return;
    }

    // ✅ GEEN exacte match → dichtstbij zoeken
    let candidates = data.filter(r =>
        levenshtein(r.straat.toUpperCase(), straat) <= 2 &&
        r.type === type
    );

    let bestResults = [];
    let minDist = Infinity;

    candidates.forEach(r => {

        let d =
            nr < r.min ? r.min - nr :
            nr > r.max ? nr - r.max : 0;

        if(d < minDist){
            minDist = d;
            bestResults = [r];
        } else if(d === minDist){
            bestResults.push(r);
        }
    });

    if(bestResults.length > 0){

let tekst = "Straat: " + besteStraat + "<br><br>Dichtstbij:<br>";


        bestResults.forEach(m => {
            tekst += m.gemeente + " → " + m.round + "<br>";
        });

        document.getElementById("resultaat").innerHTML = tekst;

   } else {
    document.getElementById("resultaat").innerText = "Niet gevonden";
}
